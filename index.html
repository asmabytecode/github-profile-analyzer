<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Stats Visualizer</title>
    <link rel="stylesheet" href="style.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>GitHub Profile Analyzer</h1>
      <div class="search-box">
        <input
          type="text"
          id="username"
          placeholder="Введіть нік на GitHub (напр. gaearon)"
        />
        <button id="searchBtn">Аналізувати</button>
      </div>

      <div id="loader" class="loader" style="display: none"></div>

      <div id="profile-card" class="card" style="display: none">
        <div class="user-info">
          <img id="avatar" src="" alt="Avatar" />
          <div>
            <h2 id="name"></h2>
            <p id="bio"></p>
            <a id="profile-link" target="_blank" href="">Перейти в профіль</a>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-item">
            <span class="label">Репозиторії</span>
            <span id="repo-count" class="value">0</span>
          </div>
          <div class="stat-item">
            <span class="label">Зірки (Stars)</span>
            <span id="star-count" class="value">0</span>
          </div>
          <div class="stat-item">
            <span class="label">Підписники</span>
            <span id="followers" class="value">0</span>
          </div>
        </div>

        <div class="chart-container">
          <h3>Стек мов програмування</h3>
          <canvas id="langChart"></canvas>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
